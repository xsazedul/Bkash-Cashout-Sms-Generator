<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cashout SMS Generator</title>
  <style>
    /* ── Reset & base ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef2f7;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    body.dark {
      background: #1a1c1f;
      color: #e4e6eb;
    }

    /* ── Card ── */
    .card {
      max-width: 520px;
      width: 100%;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px 26px 32px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
      transition: background 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    /* gradient top border */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #4a7cf7, #6c5ce7, #a29bfe);
      border-radius: 24px 24px 0 0;
    }

    body.dark .card {
      background: #24262b;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    /* ── Header ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      margin-top: 4px;
    }

    .card-header h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #4a7cf7, #6c5ce7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    body.dark .card-header h2 {
      background: linear-gradient(135deg, #7a9cf7, #9b8cf7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 40px;
      background: #f0f2f5;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }

    body.dark .theme-toggle {
      background: #3a3d44;
    }

    .theme-toggle:hover {
      background: #e0e2e6;
      transform: scale(1.05);
    }

    body.dark .theme-toggle:hover {
      background: #4a4d55;
    }

    /* ── Form fields ── */
    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #5a5e66;
      margin-bottom: 5px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    body.dark .field label {
      color: #aaadb5;
    }

    .field input {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 2px solid #e2e6ec;
      border-radius: 12px;
      background: #ffffff;
      color: #1a1c1f;
      transition: border 0.25s, background 0.3s, color 0.3s, box-shadow 0.25s;
      outline: none;
    }

    body.dark .field input {
      background: #2f3238;
      border-color: #3f4249;
      color: #e4e6eb;
    }

    .field input:focus {
      border-color: #4a7cf7;
      box-shadow: 0 0 0 4px rgba(74, 124, 247, 0.15);
    }

    body.dark .field input:focus {
      border-color: #5f8af7;
      box-shadow: 0 0 0 4px rgba(95, 138, 247, 0.2);
    }

    .field input::placeholder {
      color: #b0b4bc;
      font-weight: 400;
    }

    /* dual row */
    .row-duo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .actions button {
      flex: 1;
      min-width: 80px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      letter-spacing: 0.3px;
    }

    .actions button:active {
      transform: scale(0.96);
    }

    .btn-generate {
      background: linear-gradient(135deg, #4a7cf7, #6c5ce7);
      color: #fff;
      box-shadow: 0 4px 12px rgba(74, 124, 247, 0.3);
    }

    .btn-generate:hover {
      box-shadow: 0 6px 20px rgba(74, 124, 247, 0.4);
      transform: translateY(-1px);
    }

    .btn-copy {
      background: #28a745;
      color: #fff;
      box-shadow: 0 4px 12px rgba(40, 167, 69, 0.25);
    }

    .btn-copy:hover {
      background: #218838;
      box-shadow: 0 6px 20px rgba(40, 167, 69, 0.35);
      transform: translateY(-1px);
    }

    .btn-clear {
      background: #eef0f4;
      color: #1a1c1f;
    }

    body.dark .btn-clear {
      background: #3a3d44;
      color: #e4e6eb;
    }

    .btn-clear:hover {
      background: #e2e4e8;
    }

    body.dark .btn-clear:hover {
      background: #4a4d55;
    }

    /* ── Output ── */
    .output-wrap {
      margin-top: 20px;
    }

    .output-wrap textarea {
      width: 100%;
      height: 110px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.5;
      border: 2px solid #e2e6ec;
      border-radius: 12px;
      background: #f8f9fc;
      color: #1a1c1f;
      resize: none;
      transition: border 0.25s, background 0.3s, color 0.3s;
      outline: none;
    }

    body.dark .output-wrap textarea {
      background: #2f3238;
      border-color: #3f4249;
      color: #e4e6eb;
    }

    .output-wrap textarea:focus {
      border-color: #4a7cf7;
    }

    .char-counter {
      text-align: right;
      font-size: 13px;
      color: #b0b4bc;
      margin-top: 6px;
      padding-right: 4px;
      transition: color 0.3s;
      font-weight: 500;
    }

    .char-counter.warning {
      color: #e6a23c;
    }

    .char-counter.danger {
      color: #e74c3c;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1c1f;
      color: #fff;
      padding: 14px 32px;
      border-radius: 40px;
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s, transform 0.4s;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    body.dark .toast {
      background: #e4e6eb;
      color: #1a1c1f;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card {
        padding: 20px 16px 24px;
      }
      .row-duo {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .actions button {
        font-size: 14px;
        padding: 12px 10px;
        min-width: 60px;
      }
      .card-header h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Header -->
    <div class="card-header">
      <h2>Cashout SMS</h2>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
    </div>

    <!-- Form -->
    <div class="field">
      <label for="amount">Cashout Amount</label>
      <input id="amount" type="number" placeholder="0.00" step="0.01" min="0" />
    </div>

    <div class="field">
      <label for="number">Sender Number</label>
      <input id="number" placeholder="01XXXXXXXXX" />
    </div>

    <div class="field">
      <label for="trx">Transaction ID</label>
      <input id="trx" placeholder="TRX123456789" />
    </div>

    <div class="field">
      <label for="prevBalance">Previous Balance</label>
      <input id="prevBalance" type="number" placeholder="0.00" step="0.01" min="0" />
    </div>

    <div class="row-duo">
      <div class="field">
        <label for="date">Date</label>
        <input id="date" type="text" placeholder="DD/MM/YYYY" />
      </div>
      <div class="field">
        <label for="time">Time</label>
        <input id="time" type="text" placeholder="HH:MM" />
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-generate" id="generateBtn">Generate</button>
      <button class="btn-copy" id="copyBtn">Copy</button>
      <button class="btn-clear" id="clearBtn">Clear</button>
    </div>

    <!-- Output -->
    <div class="output-wrap">
      <textarea id="output" readonly placeholder="SMS preview will appear here…"></textarea>
      <div class="char-counter" id="charCounter">0 characters</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    (function() {
      'use strict';

      // ── DOM refs ──
      const amountEl = document.getElementById('amount');
      const numberEl = document.getElementById('number');
      const trxEl = document.getElementById('trx');
      const prevBalanceEl = document.getElementById('prevBalance');
      const dateEl = document.getElementById('date');
      const timeEl = document.getElementById('time');
      const outputEl = document.getElementById('output');
      const charCounter = document.getElementById('charCounter');

      const generateBtn = document.getElementById('generateBtn');
      const copyBtn = document.getElementById('copyBtn');
      const clearBtn = document.getElementById('clearBtn');
      const themeToggle = document.getElementById('themeToggle');
      const toast = document.getElementById('toast');

      let toastTimer = null;

      // ── helpers ──
      function formatMoney(num) {
        if (isNaN(num) || !isFinite(num)) return '0.00';
        return Number(num).toLocaleString('en-US', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function parseInput(el) {
        const raw = el.value.replace(/,/g, '').trim();
        return parseFloat(raw) || 0;
      }

      function showToast(msg, duration) {
        duration = duration || 2000;
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() {
          toast.classList.remove('show');
        }, duration);
      }

      function updateCharCounter() {
        const len = outputEl.value.length;
        let cls = '';
        if (len > 140) cls = 'danger';
        else if (len > 100) cls = 'warning';
        charCounter.className = 'char-counter' + (cls ? ' ' + cls : '');
        charCounter.textContent = len + ' character' + (len !== 1 ? 's' : '');
      }

      // ── Mask sender number ──
      function maskNumber(raw) {
        const cleaned = raw.replace(/\s/g, '');
        if (cleaned.length >= 11) {
          const first = cleaned.substring(0, 3);
          const last = cleaned.substring(cleaned.length - 3);
          return first + 'xxxxx' + last;
        } else if (cleaned.length >= 6) {
          const first = cleaned.substring(0, 2);
          const last = cleaned.substring(cleaned.length - 2);
          return first + 'xxx' + last;
        } else {
          return cleaned || '(no number)';
        }
      }

      // ── generate ──
      function generateSMS() {
        const amount = parseInput(amountEl);
        const prev = parseInput(prevBalanceEl);
        const rawNumber = numberEl.value.trim();
        const masked = maskNumber(rawNumber);
        const trx = trxEl.value.trim() || '(no trx)';
        const date = dateEl.value.trim() || 'DD/MM/YYYY';
        const time = timeEl.value.trim() || 'HH:MM';

        const fee = amount * 0.004;
        const newBalance = prev + amount + fee;

        const sms =
          'Cash Out Tk ' + formatMoney(amount) +
          ' from ' + masked +
          ' successful. Fee Tk 0.00. Balance Tk ' + formatMoney(newBalance) +
          '. TrxID ' + trx +
          ' at ' + date + ' ' + time;

        outputEl.value = sms;
        updateCharCounter();
        outputEl.style.height = 'auto';
        outputEl.style.height = outputEl.scrollHeight + 'px';
      }

      // ── copy ──
      function copySMS() {
        const text = outputEl.value;
        if (!text || text.trim() === '') {
          showToast('Nothing to copy — generate an SMS first.', 1800);
          return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text)
            .then(() => showToast('SMS copied ✔', 1500))
            .catch(() => fallbackCopy(text));
        } else {
          fallbackCopy(text);
        }
      }

      function fallbackCopy(text) {
        outputEl.select();
        try {
          document.execCommand('copy');
          showToast('SMS copied ✔', 1500);
        } catch (_) {
          showToast('Could not copy. Please select and copy manually.', 2200);
        }
        outputEl.blur();
      }

      // ── clear ──
      function clearAll() {
        amountEl.value = '';
        numberEl.value = '';
        trxEl.value = '';
        prevBalanceEl.value = '';
        fillDateTime();
        outputEl.value = '';
        updateCharCounter();
        outputEl.style.height = 'auto';
        showToast('Cleared', 1000);
        amountEl.focus();
      }

      // ── auto date/time ──
      function fillDateTime() {
        const now = new Date();
        dateEl.value = now.toLocaleDateString('en-GB', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric'
        });
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        timeEl.value = h + ':' + m;
      }

      // ── theme toggle ──
      function toggleTheme() {
        const body = document.body;
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('cashout-sms-theme', isDark ? 'dark' : 'light');
      }

      function loadTheme() {
        const stored = localStorage.getItem('cashout-sms-theme');
        if (stored === 'dark') {
          document.body.classList.add('dark');
          themeToggle.textContent = '☀️';
        } else {
          document.body.classList.remove('dark');
          themeToggle.textContent = '🌙';
        }
      }

      function autoResize() {
        outputEl.style.height = 'auto';
        outputEl.style.height = outputEl.scrollHeight + 'px';
      }

      function onEnterKey(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          generateSMS();
        }
      }

      // ── init ──
      function init() {
        fillDateTime();
        loadTheme();
        updateCharCounter();

        generateBtn.addEventListener('click', generateSMS);
        copyBtn.addEventListener('click', copySMS);
        clearBtn.addEventListener('click', clearAll);
        themeToggle.addEventListener('click', toggleTheme);

        outputEl.addEventListener('input', function() {
          updateCharCounter();
          autoResize();
        });

        const inputs = [amountEl, numberEl, trxEl, prevBalanceEl, dateEl, timeEl];
        inputs.forEach(inp => {
          inp.addEventListener('keydown', onEnterKey);
        });

        dateEl.addEventListener('focus', function() {
          if (!dateEl.value.trim()) fillDateTime();
        });
        timeEl.addEventListener('focus', function() {
          if (!timeEl.value.trim()) fillDateTime();
        });

        setTimeout(autoResize, 50);
        if (!outputEl.value) outputEl.value = '';
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }

    })();
  </script>
</body>
</html>
